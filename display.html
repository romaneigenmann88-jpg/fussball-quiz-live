<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Quiz-Fussball — Beamer</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:#0b132b;color:#fff;overflow:hidden}
  .wrap{height:100vh;display:flex;flex-direction:column;padding:24px;gap:18px}
  .scoreboard{display:flex;align-items:center;justify-content:center;gap:30px;font-size:3rem;font-weight:900}
  .scoreboard .tA{color:#4aa3e8}.scoreboard .tB{color:#ff6b6b}
  .scoreboard .sep{color:#7a8aae;font-size:2rem}
  /* Spielfeld */
  .pitch{flex:1;position:relative;border-radius:20px;background:
      repeating-linear-gradient(90deg,#1e7a3a 0 10%,#229142 10% 20%);
      border:6px solid #fff;overflow:hidden;display:flex;align-items:center}
  .goal{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:42%;background:rgba(255,255,255,.85);border:4px solid #fff}
  .goal.left{left:-6px;border-radius:0 12px 12px 0}
  .goal.right{right:-6px;border-radius:12px 0 0 12px}
  .midline{position:absolute;left:50%;top:0;bottom:0;width:4px;background:rgba(255,255,255,.6)}
  .midcircle{position:absolute;left:50%;top:50%;width:160px;height:160px;border:4px solid rgba(255,255,255,.6);border-radius:50%;transform:translate(-50%,-50%)}
  .ball{position:absolute;top:50%;font-size:3.2rem;transition:left .8s cubic-bezier(.5,1.6,.5,1);transform:translate(-50%,-50%);filter:drop-shadow(0 4px 6px rgba(0,0,0,.4))}
  .teamtag{position:absolute;top:14px;font-size:1.4rem;font-weight:900;text-shadow:0 2px 6px rgba(0,0,0,.5)}
  .teamtag.A{left:24px;color:#cfe7ff}.teamtag.B{right:24px;color:#ffd6d6}
  .roster{position:absolute;bottom:14px;font-size:1rem;max-width:38%;opacity:.9}
  .roster.A{left:24px}.roster.B{right:24px;text-align:right}
  /* Join-Overlay (Lobby) */
  .join{position:absolute;inset:0;background:rgba(11,19,43,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .join h2{font-size:2rem;margin:0}
  #qr{background:#fff;padding:16px;border-radius:16px}
  .join .url{font-size:1rem;color:#9fb0d6;word-break:break-all;max-width:80%}
  .question{position:absolute;left:50%;top:18px;transform:translateX(-50%);background:rgba(0,0,0,.45);padding:10px 20px;border-radius:14px;font-size:1.3rem;max-width:70%;text-align:center;display:none}
  .status{position:fixed;top:8px;right:12px;font-size:.8rem;color:#7a8aae}
</style>
</head>
<body>
<div class="status" id="status">verbinde…</div>
<div class="wrap">
  <div class="scoreboard">
    <span class="tA" id="nameA">🔵 Team Blau</span>
    <span class="sA">0</span><span class="sep">:</span><span class="sB">0</span>
    <span class="tB" id="nameB">🔴 Team Rot</span>
  </div>

  <div class="pitch" id="pitch">
    <div class="goal left"></div>
    <div class="goal right"></div>
    <div class="midline"></div>
    <div class="midcircle"></div>
    <div class="teamtag A" id="tagA">🔵</div>
    <div class="teamtag B" id="tagB">🔴</div>
    <div class="ball" id="ball">⚽</div>
    <div class="roster A" id="rA"></div>
    <div class="roster B" id="rB"></div>
    <div class="question" id="question"></div>

    <div class="join" id="joinOverlay">
      <h2>⚽ Mitspielen!</h2>
      <div id="qr"></div>
      <div class="url" id="url">…</div>
      <div id="lobbyCount" style="font-size:1.1rem;color:#cfe7ff"></div>
    </div>
  </div>
</div>

<script>
  const PEER_CONFIG = { host:'wwm-peer-broker.onrender.com', port:443, path:'/', secure:true };
  const hostId=new URLSearchParams(location.search).get('host');
  let peer=null, conn=null, qrDrawn=false;

  function setStatus(t){ document.getElementById('status').textContent=t; }

  let reconnectDelay=1000, reconnectTimer=null;
  function scheduleReconnect(){ if(reconnectTimer||!peer||peer.destroyed)return; reconnectTimer=setTimeout(()=>{reconnectTimer=null; if(peer&&!peer.destroyed&&peer.disconnected){try{peer.reconnect();}catch(e){}} reconnectDelay=Math.min(reconnectDelay*2,30000);},reconnectDelay); }

  function connect(){
    if(!hostId){ setStatus('Kein Host-Link!'); return; }
    peer=new Peer({...PEER_CONFIG});
    peer.on('open',()=>{
      reconnectDelay=1000; if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
      conn=peer.connect(hostId,{reliable:true});
      conn.on('open',()=>{ setStatus('verbunden'); conn.send({type:'displayJoin'}); });
      conn.on('data',render);
      conn.on('close',()=>{ setStatus('Host getrennt'); setTimeout(connect,3000); });
    });
    peer.on('disconnected',()=>{ setStatus('reconnect…'); scheduleReconnect(); });
    peer.on('error',e=>{ console.error(e); setStatus('Fehler: '+e.type); });
  }

  // Ballposition -2..2 in % auf dem Feld (10% Rand je Seite)
  function ballLeft(pos){ return (50 + pos*20) + '%'; }   // 0->50%, +2->90%, -2->10%

  function render(s){
    if(s.type!=='state')return;
    document.getElementById('nameA').textContent=s.teams.A.emoji+' '+s.teams.A.name;
    document.getElementById('nameB').textContent=s.teams.B.emoji+' '+s.teams.B.name;
    document.querySelector('.sA').textContent=s.score.A;
    document.querySelector('.sB').textContent=s.score.B;
    document.getElementById('tagA').textContent=s.teams.A.emoji+' '+s.teams.A.name;
    document.getElementById('tagB').textContent=s.teams.B.emoji+' '+s.teams.B.name;
    document.getElementById('rA').innerHTML=s.teams.A.players.map(esc).join(' · ');
    document.getElementById('rB').innerHTML=s.teams.B.players.map(esc).join(' · ');
    document.getElementById('ball').style.left=ballLeft(s.ballPos||0);

    if(s.phase==='lobby'){
      document.getElementById('joinOverlay').style.display='flex';
      document.getElementById('lobbyCount').textContent=(s.teams.A.players.length+s.teams.B.players.length)+' Spieler bereit';
      if(!qrDrawn && s.joinUrl){ document.getElementById('url').textContent=s.joinUrl; new QRCode(document.getElementById('qr'),{text:s.joinUrl,width:220,height:220}); qrDrawn=true; }
    } else {
      document.getElementById('joinOverlay').style.display='none';
    }
  }
  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

  connect();
</script>
</body>
</html>
