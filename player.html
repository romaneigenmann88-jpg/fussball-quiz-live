<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ Quiz-Fussball</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;color:#eafff0;min-height:100vh;display:flex;flex-direction:column;
       background:linear-gradient(160deg,#0a4d24 0%,#0c3a1d 70%,#072a14 100%);background-color:#0b3d1e}
  .topbar{padding:10px 14px;background:rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;font-size:.85rem}
  .dot{width:10px;height:10px;border-radius:50%;background:#e74c3c}
  .dot.green{background:#7CFC00}
  .spacer{flex:1}
  .myteam{font-weight:800;padding:3px 10px;border-radius:999px;font-size:.8rem}
  .screen{flex:1;display:none;flex-direction:column;justify-content:center;align-items:center;padding:22px;text-align:center;gap:16px}
  .screen.active{display:flex}
  h1{font-size:1.5rem;margin:0}
  input{width:100%;max-width:340px;padding:14px;font-size:1.1rem;border-radius:12px;border:1px solid #2c8c4c;background:rgba(0,0,0,.3);color:#eafff0;text-align:center}
  .btn{padding:14px 24px;font-size:1.1rem;font-weight:800;border:none;border-radius:14px;background:#ffd633;color:#1a3a10;cursor:pointer}
  .btn:disabled{background:#3a5a44;color:#8fb89c}
  .team-badge{font-size:1.5rem;font-weight:900;padding:16px 24px;border-radius:18px}
  .question{font-size:1.35rem;font-weight:700;max-width:520px}
  .options{display:grid;gap:12px;width:100%;max-width:460px}
  .opt{padding:16px;font-size:1.15rem;font-weight:700;border:2px solid #2c8c4c;border-radius:14px;background:rgba(0,0,0,.25);color:#eafff0;cursor:pointer;text-align:left}
  .opt:disabled{opacity:.6}
  .opt.correct{background:#1e7a3a;border-color:#7CFC00}
  .opt.wrong{background:#7a1e1e;border-color:#e74c3c}
  .opt.chosen{outline:3px solid #ffd633}
  .spectate .opt{cursor:default;opacity:.78}
  .banner{font-size:1.2rem;font-weight:800}
  .banner.dran{font-size:1.7rem;background:#ffd633;color:#1a3a10;padding:10px 22px;border-radius:14px;box-shadow:0 4px 16px rgba(255,214,51,.4)}
  .banner.strateg,.banner.klicker{font-size:1.45rem;padding:10px 20px;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .banner.strateg{background:#16c4c4;color:#04222a}
  .banner.klicker{background:#ffd633;color:#1a3a10}
  .chip{display:inline-block;min-width:74px;padding:6px 10px;border-radius:8px;font-weight:800;color:#fff;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.45)}
  .strateg-row{display:flex;align-items:center;gap:10px;text-align:left}
  .strateg-row.correct{outline:3px solid #2ecc71;background:rgba(46,204,113,.18)}
  .atxt{flex:1}
  .rico{color:#2ecc71;font-weight:800;white-space:nowrap}
  .colorbtn{font-size:1.5rem;font-weight:900;min-height:66px;text-shadow:0 2px 4px rgba(0,0,0,.45);text-align:center}
  .reconnect{position:fixed;top:0;left:0;right:0;background:#e67e22;color:#fff;text-align:center;padding:6px;font-size:.85rem;display:none}
  .muted{color:#9ecbaa}
  .big{font-size:2rem;font-weight:900}
</style>
</head>
<body>
<div class="reconnect" id="reconnectBanner">Verbindung verloren – versuche erneut…</div>
<div class="topbar"><span class="dot" id="dot"></span><span id="statusText">verbinde…</span><span class="spacer"></span><span class="myteam" id="myTeamTag" style="display:none"></span></div>

<div class="screen active" id="loginScreen">
  <h1>⚽ Quiz-Fussball</h1>
  <p class="muted">Name eingeben und ins Team!</p>
  <input id="nameInput" placeholder="Dein Name" maxlength="20" autocomplete="off">
  <button class="btn" id="joinBtn">Beitreten</button>
</div>

<div class="screen" id="waitScreen">
  <p class="muted">Du spielst für</p>
  <div class="team-badge" id="teamBadge">…</div>
  <p class="muted" id="waitText">Warte, bis der Anpfiff kommt…</p>
</div>

<div class="screen" id="playScreen">
  <div class="banner" id="roleBanner"></div>
  <div class="question" id="questionText"></div>
  <div class="options" id="options"></div>
  <div class="muted" id="feedback"></div>
</div>

<div class="screen" id="endScreen">
  <div class="big" id="endTitle">Schlusspfiff!</div>
  <div class="team-badge" id="endScore">0 : 0</div>
  <div id="endText" class="muted"></div>
</div>

<script>
  const PEER_CONFIG   = { host:'wwm-peer-broker.onrender.com', port:443, path:'/', secure:true };
  const METERED_CONFIG= { username:'c4ca643ec3ef89475fda8aaf', credential:'958T4scRQJRKgSyg' };
  function buildIce(){const u=METERED_CONFIG.username,c=METERED_CONFIG.credential;return [{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun.relay.metered.ca:80'},{urls:'turn:global.relay.metered.ca:80',username:u,credential:c},{urls:'turn:global.relay.metered.ca:80?transport=tcp',username:u,credential:c},{urls:'turn:global.relay.metered.ca:443',username:u,credential:c},{urls:'turns:global.relay.metered.ca:443?transport=tcp',username:u,credential:c}];}

  const params=new URLSearchParams(location.search);const hostId=params.get('host');
  let peer=null,conn=null,playerName='',myTeam=null,curQ=null,qShownAt=0,myRole='spectate',answered=false;

  function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
  function setStatus(t,ok){document.getElementById('statusText').textContent=t;document.getElementById('dot').className='dot'+(ok?' green':'');}
  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function badge(el){el.textContent=myTeam.emoji+' '+myTeam.teamName;el.style.background=myTeam.color;el.style.color='#fff';}

  if(!hostId)setStatus('Kein Host-Link! QR erneut scannen.',false);
  document.getElementById('joinBtn').addEventListener('click',join);
  document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')join();});
  const saved=localStorage.getItem('fbName');if(saved)document.getElementById('nameInput').value=saved;

  function join(){playerName=document.getElementById('nameInput').value.trim();
    if(!playerName){document.getElementById('nameInput').focus();return;}
    if(!hostId){alert('Kein Host-Link. QR erneut scannen.');return;}
    localStorage.setItem('fbName',playerName);document.getElementById('joinBtn').disabled=true;connect();}

  let rD=1000,rT=null;
  function scheduleReconnect(){if(rT||!peer||peer.destroyed)return;rT=setTimeout(()=>{rT=null;if(peer&&!peer.destroyed&&peer.disconnected){try{peer.reconnect();}catch(e){}}rD=Math.min(rD*2,30000);},rD);}
  function connect(){
    peer=new Peer({...PEER_CONFIG, config:{iceServers:buildIce()}});
    peer.on('open',()=>{rD=1000;if(rT){clearTimeout(rT);rT=null;}setStatus('verbinde mit Host…',false);
      conn=peer.connect(hostId,{reliable:true});
      conn.on('open',()=>{setStatus('verbunden',true);document.getElementById('reconnectBanner').style.display='none';conn.send({type:'join',name:playerName});});
      conn.on('data',handleHost);
      conn.on('close',()=>{setStatus('Verbindung verloren',false);document.getElementById('reconnectBanner').style.display='block';retryConn();});
      conn.on('error',e=>console.error('Conn:',e));});
    peer.on('disconnected',()=>{setStatus('getrennt – reconnect…',false);scheduleReconnect();});
    peer.on('error',e=>{console.error('Peer:',e);if(e.type==='peer-unavailable'){setStatus('Host nicht gefunden',false);document.getElementById('joinBtn').disabled=false;}});}
  function retryConn(){setTimeout(()=>{if(!conn||!conn.open){try{conn=peer.connect(hostId,{reliable:true});conn.on('open',()=>{conn.send({type:'join',name:playerName});setStatus('verbunden',true);document.getElementById('reconnectBanner').style.display='none';});conn.on('data',handleHost);conn.on('close',()=>{document.getElementById('reconnectBanner').style.display='block';retryConn();});}catch(e){}}},3000);}

  function handleHost(data){switch(data.type){
    case 'assigned':myTeam=data;badge(document.getElementById('teamBadge'));
      const tag=document.getElementById('myTeamTag');tag.style.display='inline-block';tag.textContent=data.emoji+' '+data.teamName;tag.style.background=data.color;tag.style.color='#fff';
      if(!data.gameStarted)show('waitScreen');break;
    case 'question':renderQuestion(data);break;
    case 'spectate':renderSpectate(data);break;
    case 'strateg':renderStrateg(data);break;
    case 'klicker':renderKlicker(data);break;
    case 'lock':lockKlicker(data.ms);break;
    case 'answerAck':ackAnswer(data.correct);break;
    case 'retry':enableOptions();document.getElementById('feedback').textContent='Nochmal versuchen!';break;
    case 'roundResult':renderRoundResult(data);break;
    case 'matchEnd':renderEnd(data);break;
    case 'backToLobby':show('waitScreen');break;
    case 'kicked':document.getElementById('teamBadge').textContent='—';document.getElementById('waitText').textContent='Du wurdest vom Host entfernt. Zum Wiedereinsteigen: Seite neu laden.';show('waitScreen');break;}}

  function renderQuestion(d){curQ=d;myRole='active';answered=false;qShownAt=performance.now();show('playScreen');
    document.getElementById('playScreen').classList.remove('spectate');
    const rb=document.getElementById('roleBanner');rb.className='banner dran';rb.textContent='🎯 DU BIST DRAN!';rb.style.color='';
    document.getElementById('questionText').textContent='Frage '+(d.qIndex+1)+': '+d.frage;
    const wrap=document.getElementById('options');wrap.innerHTML='';
    d.antworten.forEach((a,i)=>{const b=document.createElement('button');b.className='opt';b.textContent=a;b.onclick=()=>choose(i,b);wrap.appendChild(b);});
    document.getElementById('feedback').textContent='';}
  function renderSpectate(d){myRole='spectate';answered=false;show('playScreen');
    document.getElementById('playScreen').classList.add('spectate');
    const rb=document.getElementById('roleBanner');rb.className='banner';rb.textContent='👀 Zuschauer – denk schon mit!';rb.style.color='#9ecbaa';
    const qn=(d.qIndex!=null)?('Frage '+(d.qIndex+1)+': '):'';
    document.getElementById('questionText').textContent=d.frage?(qn+d.frage):'';
    const names=(d.activeNames&&d.activeNames.length)?d.activeNames.map(esc).join(' & '):'…';
    document.getElementById('options').innerHTML='<div class="muted" style="padding:16px;line-height:1.5">Am Ball: <b style="color:#ffd633">'+names+'</b><br>Die Antworten sehen nur die Aktiven – sei bereit! ⚽</div>';
    document.getElementById('feedback').textContent='';}
  function choose(i,btn){if(answered||myRole!=='active')return;answered=true;
    document.querySelectorAll('#options .opt').forEach(o=>{o.disabled=true;o.classList.remove('chosen');});btn.classList.add('chosen');
    conn.send({type:'answer',qIndex:curQ.qIndex,choice:i,reactionMs:Math.round(performance.now()-qShownAt)});
    document.getElementById('feedback').textContent='Antwort gesendet…';}
  function enableOptions(){answered=false;document.querySelectorAll('#options .opt').forEach(o=>{o.disabled=false;o.classList.remove('chosen','wrong','correct');});}
  function ackAnswer(correct){document.getElementById('feedback').textContent=correct?'✅ Richtig!':'❌ Falsch – Ersatz übernimmt (falls vorhanden).';
    const ch=document.querySelector('#options .opt.chosen');if(ch)ch.classList.add(correct?'correct':'wrong');}
  function renderStrateg(d){myRole='strateg';answered=false;show('playScreen');
    document.getElementById('playScreen').classList.add('spectate');
    const rb=document.getElementById('roleBanner');rb.className='banner strateg';rb.style.color='';rb.style.background='';rb.textContent='🧠 STRATEGE – finde die Antwort, sag die FARBE an (klicke NICHT)!';
    document.getElementById('questionText').textContent='Frage '+(d.qIndex+1)+': '+d.frage;
    const wrap=document.getElementById('options');wrap.innerHTML='';
    d.antworten.forEach((a,i)=>{const row=document.createElement('div');row.className='opt strateg-row';
      row.innerHTML='<span class="chip" style="background:'+a.color.hex+'">'+esc(a.color.name)+'</span><span class="atxt">'+esc(a.text)+'</span>';
      wrap.appendChild(row);});
    document.getElementById('feedback').textContent='Überlege, welche Antwort stimmt – und sag deinem Klicker ihre Farbe!';}
  function renderKlicker(d){myRole='klicker';answered=false;curQ=d;show('playScreen');
    document.getElementById('playScreen').classList.remove('spectate');
    const rb=document.getElementById('roleBanner');rb.className='banner klicker';rb.style.color='';rb.style.background='';rb.textContent='👆 KLICKER – drücke die angesagte Farbe!';
    document.getElementById('questionText').textContent=d.frage?('Frage '+(d.qIndex+1)+': '+d.frage):'Welche Farbe sagt dein Stratege?';
    const wrap=document.getElementById('options');wrap.innerHTML='';
    d.colors.forEach(c=>{const b=document.createElement('button');b.className='opt colorbtn';b.style.background=c.hex;b.style.borderColor=c.hex;b.style.color='#fff';b.textContent=c.name;
      b.onclick=()=>{conn.send({type:'answer',qIndex:d.qIndex,choice:c.answerIndex});document.getElementById('feedback').textContent='Gedrückt: '+c.name+' …';};wrap.appendChild(b);});
    document.getElementById('feedback').textContent='Hör auf deinen Strategen und drücke die Farbe!';}
  function lockKlicker(ms){const btns=document.querySelectorAll('#options .colorbtn');btns.forEach(b=>b.disabled=true);
    document.getElementById('feedback').textContent='❌ Falsch! '+(ms/1000)+' Sek Sperre…';
    setTimeout(()=>{btns.forEach(b=>b.disabled=false);document.getElementById('feedback').textContent='Nochmal! Welche Farbe?';},ms);}
  function renderRoundResult(d){show('playScreen');document.getElementById('playScreen').classList.add('spectate');
    const rb=document.getElementById('roleBanner');rb.className='banner';
    const won=d.winner===myTeam.team;
    rb.textContent=d.winner?(won?'⚽ Dein Team gewinnt die Frage!':'Gegner war schneller…'):'Niemand – Ball bleibt.';
    rb.style.color=won?'#7CFC00':'#9ecbaa';
    document.getElementById('questionText').textContent=d.frage?('Frage: '+d.frage):'';
    const wrap=document.getElementById('options');wrap.innerHTML='';
    (d.antworten||[]).forEach((a,i)=>{const b=document.createElement('div');b.className='opt'+(i===d.correctIndex?' correct':'');b.textContent=a;wrap.appendChild(b);});
    document.getElementById('feedback').textContent='Richtige Antwort: '+(d.antworten?d.antworten[d.correctIndex]:'');}
  function renderEnd(d){show('endScreen');
    const eA=d.teams?d.teams.A.emoji:'🔵',eB=d.teams?d.teams.B.emoji:'🔴';
    document.getElementById('endScore').textContent=eA+' '+d.score.A+' : '+d.score.B+' '+eB;
    const won=d.winner===myTeam.team;
    document.getElementById('endTitle').textContent=d.winner?(won?'🏆 Ihr habt gewonnen!':'Diesmal verloren'):'🤝 Unentschieden!';
    document.getElementById('endText').textContent=d.winner?('Sieger: '+(d.teams?(d.teams[d.winner].emoji+' '+d.teams[d.winner].name):d.winner)):'';}
</script>
</body>
</html>
